<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>How well do you know Hina?</title>

<style>

body{
font-family: 'Segoe UI', sans-serif;
background: linear-gradient(135deg,#ffd9ec,#ffffff);
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
margin:0;
overflow-x:hidden;
}

.container{
background:white;
padding:25px;
width:90%;
max-width:420px;
border-radius:25px;
box-shadow:0 15px 40px rgba(0,0,0,0.1);
text-align:center;
animation: fade 1s;
}

h1{
color:#ff4fa3;
font-size:24px;
}

.question{
font-size:18px;
margin-top:20px;
}

button{
width:100%;
padding:12px;
margin:8px 0;
border:none;
border-radius:12px;
background:#ffe4f2;
cursor:pointer;
font-size:16px;
transition:0.25s;
}

button:hover{
background:#ffb6d9;
}

.start{
background:#ff6fb5;
color:white;
}

input{
padding:10px;
border-radius:10px;
border:1px solid #ccc;
width:80%;
}

#result{
margin-top:20px;
font-size:20px;
color:#ff4fa3;
}

@keyframes fade{
from{opacity:0;transform:translateY(20px);}
to{opacity:1;transform:translateY(0);}
}

/* floating hearts */

.heart{
position:fixed;
bottom:-20px;
font-size:20px;
animation:float 6s linear infinite;
color:#ff7eb9;
}

@keyframes float{
0%{transform:translateY(0);}
100%{transform:translateY(-100vh);}
}

</style>
</head>

<body>

<div class="container">

<h1>How well do you know Hina? 💗</h1>

<div id="start">
<p>Enter your name to start the quiz</p>

<input id="username" placeholder="Your name">

<br><br>

<button class="start" onclick="startQuiz()">Start Quiz</button>

</div>

<div id="quiz" style="display:none">

<div class="question" id="question"></div>

<div id="answers"></div>

</div>

<div id="result"></div>

</div>

<script>

let questions=[

{
q:"Meri vibes in mn se kon si hai?",
a:["Baddie Vibes","Mixed Vibes","Desi Vibes"],
c:1
},

{
q:"Mujhe sab se zayada kya karna pasand hai?",
a:["Mobile use Karna","Books padhna","Baatein karna"],
c:2
},

{
q:"Meri personality kya hai?",
a:["Introverted","Extroverted","Both"],
c:0
},

{
q:"Agr mujhe in mn se aik choose karna pade?",
a:["Money","Love","Peace"],
c:2
},

{
q:"Mujhe sab se zayada gussa kis baat per aata hai?",
a:["Jab koi meri baat na sune","Jab koi disturb kare","Jab koi judge kare"],
c:2
},

{
q:"Mujhe kis tarha ke log pasand hain?",
a:["Jo mujh per trust karte hon","Jo mujhe judge na kare","Jo mujhe value dein"],
c:1
},

{
q:"Main zyada kis cheez ko prefer karti hun?",
a:["Chatting","Calls","Voice messages"],
c:2
},

{
q:"Mera favourite food kya hai?",
a:["Biryani","Ice cream","Burger"],
c:0
}

];

let current=0;
let score=0;
let name="";

function startQuiz(){

name=document.getElementById("username").value;

if(name==""){
alert("Please enter your name");
return;
}

document.getElementById("start").style.display="none";
document.getElementById("quiz").style.display="block";

showQuestion();

}

function showQuestion(){

let q=questions[current];

document.getElementById("question").innerHTML=q.q;

let options="";

q.a.forEach((opt,i)=>{

options+=`<button onclick="answer(${i})">${opt}</button>`;

});

document.getElementById("answers").innerHTML=options;

}

function answer(i){

if(i==questions[current].c){

score++;

}

current++;

if(current<questions.length){

showQuestion();

}else{

showResult();

}

}

function showResult(){

document.getElementById("quiz").style.display="none";

let message="";

if(score>=6){

message="Wow! You really know me well 🫶";

}else{

message="Hmm… lagta hai mujhe aur samajhne ki zarurat hai 😅";

}

document.getElementById("result").innerHTML=

name+" your score is "+score+"/8 <br><br>"+message;

}

/* hearts animation */

setInterval(()=>{

let heart=document.createElement("div");

heart.className="heart";

heart.innerHTML="💗";

heart.style.left=Math.random()*100+"vw";

heart.style.fontSize=(Math.random()*10+15)+"px";

document.body.appendChild(heart);

setTimeout(()=>{

heart.remove();

},6000);

},600);

</script>

</body>
</html>
